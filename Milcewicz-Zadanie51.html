<html>
<body>
<div style="color:red;font-size:50px;">
<script language="JavaScript">
 silnia_koniec=parseFloat(prompt("z czego silnia",""));
 if(silnia_koniec==0){silnia_mil=1;}
	else
	 {var silnia_mil=1;
	  for(i=1;i<=silnia_koniec;i++){
	    silnia_mil=silnia_mil*i;
		}
  	      }
document.write("silnia("+silnia_koniec+")="+silnia_mil);
</script>
</div>
</body>
</html>
