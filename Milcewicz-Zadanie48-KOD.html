<!DOCTYPE html>
 <head>
 <title>Sprawdzenie danych Milcewicz </title>
 <meta charset="utf-8">
 </head>
<body>
<div style="color:red;font-size:50px;">
 <script language="JavaScript">
 do {
var liczba1=prompt("wysokość=","");
 var h_mil=parseFloat(liczba1);
 }
 while ( h_mil<=0);
 do {
var liczba1=prompt("podstawę=","");
 var a_mil=parseFloat(liczba1);
 }
 while(!( a_mil>0));
var Pole=a_mil*h_mil/2;
 document.write("Pole="+Pole.toFixed(2)+" cm^2"+"<br>");
 </script>
</div>
</body>
