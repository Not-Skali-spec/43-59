<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8">
<title>Zadanie 47 Milcewicz</title>
</head>
<body>
<script>

var koniec_petli_mil = 11;
var rozmiar_mil = 40;
var n_mil = prompt("Podaj liczbę:");
if (n_mil % 2 == 0) {
    for (var i_mil = 1; i_mil <= koniec_petli_mil; i_mil++) {
        document.write("<font color = 'blue' size = " + rozmiar_mil + "px;'>Milcewicz</font><br>");
    }
} else {
    for (var i_mil = 1; i_mil <= koniec_petli_mil; i_mil++) {
        document.write("<font color = 'green' size = " + rozmiar_mil + "px;'>Alan</font><br>");
    }
}

</script>

</body>
</html>
