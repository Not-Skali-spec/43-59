<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title>Zadanie 50 Milcewicz</title>
</head>
<body>
<script>
var suma_mil = 0;
for (var i_mil = 1; i_mil <= 1000000; i_mil++)
{
    suma_mil = suma_mil + 1 / i_mil;
}
document.write("Suma szeregu harmonicznego od 1 do 1000000 wynosi = " +suma_mil);
</script>
</body>
</html>
