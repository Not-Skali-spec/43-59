<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <title>Zadanie 54 - Prostokąt Milcewicz</title>
</head>
<body>
<script>

var poziom_mil = 24;
var pion_mil = 6;
for (var i = 1; i <= poziom_mil; i++) {
  document.write("*");
}
document.write("<br>");
for (var i = 1; i <= pion_mil; i++) {
  document.write("*");

  for (var j = 1; j <= poziom_mil - 2; j++) {
    document.write("&nbsp;&nbsp;");
  }

  document.write("*<br>");
}

for (var i = 1; i <= poziom_mil; i++) {
  document.write("*");
}
</script>
</body>
</html>
